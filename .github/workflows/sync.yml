name: Sync LeetCode Solutions

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write         # Grant write access to push changes back

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Sync Script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}
        run: |
          python scripts/main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Easy/ Medium/ Hard/
          
          # Only commit and push if there are new/modified solutions
          if [ -n "$(git status --porcelain Easy/ Medium/ Hard/)" ]; then
            git commit -m "Auto-sync: Add new LeetCode solutions"
            git push
          else
            echo "No new solutions to sync."
          fi
